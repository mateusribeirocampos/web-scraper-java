spring.application.name=webscraper

# ============================================================
# Perfil ativo default: dev
# Para trocar:
#   Linha de comando : --spring.profiles.active=prod
#   Variavel de SO   : SPRING_PROFILES_ACTIVE=prod
#   IntelliJ         : Run > Edit Configurations > Active profiles
# ============================================================
spring.profiles.active=dev

# ============================================================
# Configuracoes comuns a TODOS os perfis.
# Datasource, JPA e Flyway sao definidos individualmente
# em cada application-{perfil}.properties.
# ============================================================

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Logging base (pode ser sobrescrito por perfil)
logging.level.com.campos.webscraper=DEBUG
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN
