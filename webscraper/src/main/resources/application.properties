spring.application.name=webscraper

# ============================================================
# Perfil ativo default: dev
# Para trocar:
#   Linha de comando : --spring.profiles.active=prod
#   Variavel de SO   : SPRING_PROFILES_ACTIVE=prod
#   IntelliJ         : Run > Edit Configurations > Active profiles
# ============================================================
spring.profiles.active=dev

# ============================================================
# Configuracoes comuns a TODOS os perfis.
# Datasource, JPA e Flyway sao definidos individualmente
# em cada application-{perfil}.properties.
# ============================================================

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Logging base (pode ser sobrescrito por perfil)
logging.level.com.campos.webscraper=DEBUG
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN

# Retry baseline para fetch de paginas/APIs
webscraper.fetch.retry.max-attempts=3
webscraper.fetch.retry.wait-duration-ms=200
webscraper.fetch.rate-limit.limit-for-period=200
webscraper.fetch.rate-limit.refresh-period-ms=60000
webscraper.fetch.rate-limit.timeout-duration-ms=5000
webscraper.worker.initial-delay-ms=1000
webscraper.worker.poll-interval-ms=1000
