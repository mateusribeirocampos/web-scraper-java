# ============================================================
# Perfil: PROD (producao)
#
# Todas as credenciais vem de variaveis de ambiente.
# NUNCA hardcode credentials neste arquivo.
#
# Variaveis de ambiente obrigatorias em producao:
#   DB_URL      = jdbc:postgresql://<host>:<porta>/<database>
#   DB_USERNAME = <usuario>
#   DB_PASSWORD = <senha>
# ============================================================

# ============================================================
# Banco de dados — PostgreSQL (valores via variaveis de ambiente)
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexoes HikariCP (valores para producao)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate
#
# validate: Hibernate valida o schema contra as entidades.
# Nao cria nem altera tabelas — Flyway e o responsavel.
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# H2 console: SEMPRE desabilitado em producao
spring.h2.console.enabled=false

# Logging minimo em producao
logging.level.com.campos.webscraper=INFO
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN
