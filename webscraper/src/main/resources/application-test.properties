# ============================================================
# Perfil: TEST
#
# Usado automaticamente por testes que declaram:
#   @ActiveProfiles("test")
#
# Usa H2 em memoria para testes unitarios rapidos (sem Docker).
# Testes de integracao com @Testcontainers sobrescrevem o
# datasource com um PostgreSQL real via Docker automaticamente.
# ============================================================

# ============================================================
# Banco de dados — H2 em memoria
#
# MODE=PostgreSQL: emula comportamento do PostgreSQL no H2.
# DB_CLOSE_DELAY=-1: mantem o banco ativo durante os testes.
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ============================================================
# JPA / Hibernate
#
# create-drop: Hibernate cria o schema ao iniciar e derruba
# ao encerrar. Util com H2 em memoria para testes unitarios.
# ============================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ============================================================
# Flyway
#
# Desabilitado para testes unitarios com H2.
# O Hibernate (ddl-auto=create-drop) gerencia o schema.
# Testes de integracao com Testcontainers usam suas proprias
# configuracoes de Flyway via @ServiceConnection.
# ============================================================
spring.flyway.enabled=false

# H2 console: pode ser util para debug de testes locais
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging minimo em testes para nao poluir a saida
logging.level.com.campos.webscraper=WARN
logging.level.org.flywaydb=WARN
logging.level.org.hibernate.SQL=WARN
